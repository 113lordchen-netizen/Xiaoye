<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<title>小野 · AI排版编辑器</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* =============================================
   CSS Variables
   ============================================= */
:root {
    --bg-app:    #f4f1eb;
    --bg-panel:  #ffffff;
    --bg-input:  #fdfdfc;
    --bg-side:   #f9f7f3;
    --t1: #1c1916;
    --t2: #4a453f;
    --t3: #9a938a;
    --bd: #e8e3d8;
    --bd-focus: #72a878;
    --green:     #72a878;
    --green-bg:  #eaf4eb;
    --amber:     #c8922a;
    --amber-bg:  #fdf4e2;
    --rose:      #c8505e;
    --rose-bg:   #fdedef;
    --blue:      #4a7db5;
    --blue-bg:   #e8f0fa;
    --sh1: 0 1px 4px rgba(0,0,0,.05), 0 2px 8px rgba(0,0,0,.04);
    --sh2: 0 4px 16px rgba(0,0,0,.07);
    --sh3: 0 10px 40px rgba(0,0,0,.12);
    --r1: 8px; --r2: 12px; --r3: 16px;
    --ease: cubic-bezier(.4,0,.2,1);
    --sb: 258px;
}
[data-theme="dark"] {
    --bg-app:   #1a1720;
    --bg-panel: #221f28;
    --bg-input: #1e1c24;
    --bg-side:  #1c1a22;
    --t1: #ede8e0;
    --t2: #a8a198;
    --t3: #58525a;
    --bd: #2e2a36;
    --bd-focus: #5a9060;
    --green-bg: rgba(114,168,120,.15);
    --amber-bg: rgba(200,146,42,.12);
    --rose-bg:  rgba(200,80,94,.12);
    --blue-bg:  rgba(74,125,181,.12);
    --sh1: 0 1px 4px rgba(0,0,0,.3);
    --sh2: 0 4px 16px rgba(0,0,0,.4);
    --sh3: 0 10px 40px rgba(0,0,0,.55);
}

/* =============================================
   Reset
   ============================================= */
*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
    margin:0; padding:0; height:100vh;
    display:flex; overflow:hidden;
    background:var(--bg-app);
    font-family: -apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Segoe UI",sans-serif;
    color:var(--t1);
    transition: background .3s, color .3s;
}
button { cursor:pointer; font-family:inherit; }
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-thumb { background:var(--bd); border-radius:5px; }
::-webkit-scrollbar-track { background:transparent; }

/* =============================================
   Toast Notifications
   ============================================= */
#toasts {
    position:fixed; top:16px; right:16px;
    display:flex; flex-direction:column; gap:8px;
    z-index:9999; pointer-events:none;
}
.toast {
    display:flex; align-items:center; gap:9px;
    padding:10px 14px; border-radius:var(--r2);
    background:var(--bg-panel); border:1px solid var(--bd);
    box-shadow:var(--sh3); font-size:13px; color:var(--t1);
    opacity:0; transform:translateX(14px) scale(.97);
    transition:all .22s var(--ease); pointer-events:none;
    max-width:300px; line-height:1.4;
}
.toast.in { opacity:1; transform:none; }
.toast.success { border-left:3px solid var(--green); }
.toast.error   { border-left:3px solid var(--rose); }
.toast.info    { border-left:3px solid var(--blue); }
.toast.warning { border-left:3px solid var(--amber); }

/* =============================================
   Overlay
   ============================================= */
.ov {
    position:fixed; inset:0;
    background:rgba(0,0,0,.4);
    backdrop-filter:blur(4px);
    z-index:190; opacity:0; visibility:hidden;
    transition:all .28s var(--ease);
}
.ov.on { opacity:1; visibility:visible; }

/* =============================================
   Sidebar
   ============================================= */
.sidebar {
    width:var(--sb); flex-shrink:0;
    background:var(--bg-panel);
    border-right:1px solid var(--bd);
    display:flex; flex-direction:column;
    height:100%; z-index:200;
    transition:transform .32s var(--ease);
}
.sb-head {
    display:flex; align-items:center; gap:10px;
    padding:15px 16px; border-bottom:1px solid var(--bd);
    flex-shrink:0;
}
.sb-logo {
    width:30px; height:30px; border-radius:8px;
    background:var(--green-bg); display:flex;
    align-items:center; justify-content:center; font-size:14px;
    flex-shrink:0; border:1px solid rgba(114,168,120,.2);
}
.sb-title { font-size:13px; font-weight:700; color:var(--t1); flex:1; letter-spacing:.2px; }
.sb-close {
    display:none; background:none; border:none;
    color:var(--t3); font-size:22px; line-height:1;
    padding:2px 4px; border-radius:6px;
    transition:background .15s;
}
.sb-close:hover { background:var(--bd); }

.sb-search {
    padding:10px 14px;
    border-bottom:1px solid var(--bd); flex-shrink:0;
}
.sb-search input {
    width:100%; padding:7px 10px;
    border:1px solid var(--bd); border-radius:var(--r1);
    background:var(--bg-app); color:var(--t1);
    font-size:12px; outline:none;
    transition:border-color .2s;
    font-family:inherit;
}
.sb-search input::placeholder { color:var(--t3); }
.sb-search input:focus { border-color:var(--bd-focus); }

.tpl-list { flex:1; overflow-y:auto; padding:12px 10px; background:var(--bg-side); }

.cat-group { margin-bottom:20px; }
.cat-label {
    font-size:10px; font-weight:700; letter-spacing:1.5px;
    text-transform:uppercase; color:var(--t3);
    display:flex; align-items:center; gap:6px;
    margin:0 2px 8px; padding-top:4px;
}
.cat-label::after { content:''; flex:1; height:1px; background:var(--bd); }

.tpl-card {
    display:flex; align-items:center; gap:10px;
    padding:9px 10px; margin-bottom:4px;
    background:var(--bg-panel); border:1px solid var(--bd);
    border-radius:var(--r1); cursor:pointer;
    transition:all .18s var(--ease);
    position:relative; overflow:hidden;
}
.tpl-card::before {
    content:''; position:absolute;
    left:0; top:3px; bottom:3px; width:3px;
    background:var(--c, var(--green));
    border-radius:0 3px 3px 0;
    opacity:0; transition:opacity .18s;
}
.tpl-card:hover { border-color:var(--c, var(--green)); transform:translateX(3px); background:var(--bg-app); }
.tpl-card:hover::before { opacity:1; }
.tpl-card:active { transform:scale(.97); }

.tpl-ico {
    width:30px; height:30px; border-radius:7px;
    display:flex; align-items:center; justify-content:center;
    font-size:15px; flex-shrink:0;
}
.tpl-inf { flex:1; min-width:0; }
.tpl-name { font-size:12px; font-weight:600; color:var(--t1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tpl-desc { font-size:10px; color:var(--t3); margin-top:1px; }
.tpl-tag {
    font-size:9px; font-weight:700;
    padding:1px 5px; border-radius:4px; flex-shrink:0;
}
.tag-new { background:#e8f5ee; color:#2a7a52; }
.tag-fix { background:#e8f0fc; color:#2a5ab0; }
.tag-hot { background:#fff0e6; color:#c05020; }

/* =============================================
   Main Layout
   ============================================= */
.main { flex:1; min-width:0; display:flex; flex-direction:column; height:100%; }

/* =============================================
   Header
   ============================================= */
.hdr {
    display:flex; align-items:center;
    padding:11px 20px; gap:12px;
    background:var(--bg-panel);
    border-bottom:1px solid var(--bd);
    flex-shrink:0;
}
.menu-btn {
    display:none; width:34px; height:34px; border-radius:var(--r1);
    border:1px solid var(--bd); background:var(--bg-app);
    color:var(--t2); font-size:16px;
    align-items:center; justify-content:center;
    transition:all .18s; flex-shrink:0;
}
.menu-btn:hover { background:var(--green-bg); border-color:var(--green); }

.brand { display:flex; align-items:center; gap:8px; }
.brand-name {
    font-size:28px; line-height:1; letter-spacing:2px;
    font-family:"Xingkai SC","STXingkai","KaiTi",cursive,serif;
    font-weight:normal;
    background:linear-gradient(140deg, #ff9a9e 0%, #fecfef 35%, #a18cd1 65%, #30cfd0 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
}
.brand-meta { display:flex; flex-direction:column; gap:2px; }
.brand-tag {
    font-size:10px; font-weight:700; letter-spacing:.5px;
    background:var(--green-bg); color:var(--green);
    padding:2px 8px; border-radius:4px; line-height:1.5;
    border:1px solid rgba(114,168,120,.2);
}
.brand-slogan { font-size:10px; color:var(--t3); font-style:italic; letter-spacing:1px; }

.hdr-mid { flex:1; display:flex; justify-content:center; }
.m-tabs {
    display:none;
    background:var(--bg-app); border:1px solid var(--bd);
    border-radius:20px; padding:3px;
}
.m-tab {
    padding:5px 14px; font-size:12px; font-weight:600;
    color:var(--t3); border-radius:16px; cursor:pointer;
    transition:all .18s var(--ease); user-select:none;
    display:inline-block;
}
.m-tab.on { background:var(--bg-panel); color:var(--t1); box-shadow:var(--sh1); }

.hdr-r { display:flex; align-items:center; gap:6px; }
.ico-btn {
    width:34px; height:34px; border-radius:var(--r1);
    border:1px solid var(--bd); background:var(--bg-app);
    display:flex; align-items:center; justify-content:center;
    font-size:15px; color:var(--t2);
    transition:all .18s; flex-shrink:0;
}
.ico-btn:hover { background:var(--green-bg); border-color:var(--green); }

/* =============================================
   Toolbar
   ============================================= */
.bar {
    display:flex; align-items:center; gap:5px;
    padding:8px 16px;
    background:var(--bg-panel); border-bottom:1px solid var(--bd);
    flex-shrink:0; overflow-x:auto;
}
.bar::-webkit-scrollbar { display:none; }

.bsep { width:1px; height:18px; background:var(--bd); margin:0 3px; flex-shrink:0; }

.btn {
    display:inline-flex; align-items:center; gap:5px;
    padding:6px 13px; border-radius:var(--r1);
    border:1px solid var(--bd);
    background:var(--bg-panel); color:var(--t2);
    font-size:12px; font-weight:600;
    white-space:nowrap; flex-shrink:0;
    transition:all .18s var(--ease);
    font-family:inherit;
}
.btn:hover { transform:translateY(-1px); box-shadow:var(--sh1); }
.btn:active { transform:scale(.95); }
.btn:disabled { opacity:.45; pointer-events:none; }
.bico { font-size:13px; }
.btxt { font-size:12px; }

.btn.green  { background:var(--green-bg); color:var(--green); border-color:rgba(114,168,120,.25); }
.btn.green:hover  { background:var(--green); color:#fff; border-color:var(--green); }
.btn.amber  { background:var(--amber-bg); color:var(--amber); border-color:rgba(200,146,42,.25); }
.btn.amber:hover  { background:var(--amber); color:#fff; border-color:var(--amber); }
.btn.rose   { background:var(--rose-bg); color:var(--rose); border-color:rgba(200,80,94,.2); margin-left:auto; }
.btn.rose:hover   { background:var(--rose); color:#fff; border-color:var(--rose); }

/* =============================================
   Workspace
   ============================================= */
.ws {
    flex:1; display:flex; gap:0;
    padding:14px; background:var(--bg-app); min-height:0;
}

.inp-panel, .out-panel {
    display:flex; flex-direction:column;
    flex:1; min-width:0;
    border-radius:var(--r2); overflow:hidden;
    border:1px solid var(--bd);
    background:var(--bg-panel);
    transition:border-color .2s, box-shadow .2s;
}
.inp-panel:focus-within {
    border-color:var(--bd-focus);
    box-shadow:0 0 0 3px rgba(114,168,120,.1);
}
.out-panel { box-shadow:var(--sh2); }

.ph {
    display:flex; align-items:center; gap:8px;
    padding:8px 12px; background:var(--bg-app);
    border-bottom:1px solid var(--bd); flex-shrink:0;
}
.pdot {
    width:8px; height:8px; border-radius:50%;
}
.pdot.g { background:var(--green); box-shadow:0 0 0 2px rgba(114,168,120,.2); }
.pdot.a { background:var(--amber); box-shadow:0 0 0 2px rgba(200,146,42,.2); }
.plbl {
    font-size:10px; font-weight:700;
    letter-spacing:.8px; text-transform:uppercase; color:var(--t3);
}
.pbadge {
    margin-left:auto; font-size:10px; font-weight:700;
    background:var(--green-bg); color:var(--green);
    padding:2px 8px; border-radius:4px;
    border:1px solid rgba(114,168,120,.2);
}

#codeIn {
    flex:1; border:none; outline:none; resize:none;
    padding:14px 16px;
    font-family:'Menlo','Monaco','Consolas',monospace;
    font-size:12.5px; line-height:1.75; color:var(--t2);
    background:var(--bg-input); min-height:0;
    transition:background .3s;
}
#codeIn::placeholder { color:var(--t3); line-height:1.75; font-style:italic; }

.pfoot {
    padding:5px 12px; background:var(--bg-app);
    border-top:1px solid var(--bd); flex-shrink:0;
    display:flex; align-items:center; justify-content:space-between;
}
.char-ct { font-size:10px; color:var(--t3); font-family:monospace; }
.pfoot-hint { font-size:10px; color:var(--t3); opacity:.6; }

/* Drag handle */
.drag-h {
    width:14px; flex-shrink:0; display:flex;
    align-items:center; justify-content:center;
    cursor:col-resize; color:var(--t3);
    opacity:0; transition:opacity .2s;
}
.ws:hover .drag-h { opacity:1; }
.drag-h:hover { color:var(--green); opacity:1; }
.drag-pips { display:flex; flex-direction:column; gap:4px; }
.drag-pip { width:4px; height:4px; border-radius:50%; background:currentColor; }

/* Preview output */
.out-scroll { flex:1; overflow-y:auto; overflow-x:hidden; }
#previewOut {
    padding:28px; min-height:100%;
    outline:none; padding-bottom:80px;
}
#previewOut:empty::before {
    content:"✨ 从左侧选择模板，或在左侧输入 HTML / Markdown...";
    display:block; text-align:center;
    color:var(--t3); font-size:14px; font-style:italic;
    margin-top:80px; pointer-events:none; line-height:1.8;
}

/* =============================================
   Mobile Responsive
   ============================================= */
@media (max-width: 768px) {
    .sidebar {
        position:fixed; top:0; left:0; bottom:0;
        transform:translateX(-100%);
    }
    .sidebar.on { transform:translateX(0); box-shadow:var(--sh3); }
    .sb-close { display:block; }
    .menu-btn { display:flex; }
    .m-tabs { display:block; }
    .brand-meta { display:none; }
    .brand-name { font-size:24px; }
    .hdr { padding:10px 14px; }

    /* Workspace: absolute stacked panels */
    .ws {
        display:block; position:relative;
        padding:10px; height:100%; overflow:hidden;
    }
    .inp-panel, .out-panel {
        position:absolute;
        top:10px; left:10px; right:10px; bottom:72px;
        flex:none; width:auto;
    }
    .out-panel {
        opacity:0; visibility:hidden;
        box-shadow:none;
        transition:opacity .2s var(--ease), visibility .2s;
    }
    .out-panel.on { opacity:1; visibility:visible; }
    .drag-h { display:none; }

    /* Mobile fixed toolbar */
    .bar {
        position:fixed; bottom:0; left:0; right:0;
        height:62px; padding:0 6px;
        justify-content:space-around;
        background:rgba(255,255,255,.94);
        border-top:1px solid var(--bd); border-bottom:none;
        backdrop-filter:blur(20px) saturate(1.6);
        z-index:100; overflow:hidden; gap:0;
    }
    [data-theme="dark"] .bar { background:rgba(34,31,40,.94); }
    .bsep { display:none; }
    #btnView { display:none; }
    .btn.rose { margin-left:0; }

    .btn {
        flex-direction:column; gap:2px;
        padding:3px 2px;
        border:none !important;
        background:none !important;
        box-shadow:none !important;
        border-radius:8px;
        min-width:44px; flex:1;
        justify-content:center;
    }
    .btn:hover { transform:none; }
    .btn:active { transform:scale(.82) !important; }
    .bico { font-size:20px; }
    .btxt { font-size:9px; color:var(--t3); font-weight:500; }
    .btn.rose .btxt { color:var(--rose); }
    .btn.amber .btxt { color:var(--amber); }
    .btn.green .btxt { color:var(--green); }

    #toasts { top:10px; right:10px; left:10px; }
    .toast { max-width:none; }
}
</style>
</head>
<body>

<div id="toasts"></div>
<div class="ov" id="ov"></div>

<!-- Sidebar -->
<nav class="sidebar" id="sidebar">
    <div class="sb-head">
        <div class="sb-logo">🎨</div>
        <span class="sb-title">小野模板库</span>
        <button class="sb-close" id="sbClose">×</button>
    </div>
    <div class="sb-search">
        <input id="sbSearch" type="text" placeholder="🔍 搜索模板…">
    </div>
    <div class="tpl-list" id="tplList"></div>
</nav>

<!-- Main -->
<div class="main">

    <header class="hdr">
        <button class="menu-btn" id="btnMenu">☰</button>
        <div class="brand">
            <span class="brand-name">小野</span>
            <div class="brand-meta">
                <span class="brand-tag">AI 排版编辑器</span>
                <span class="brand-slogan">小野一下就好</span>
            </div>
        </div>
        <div class="hdr-mid">
            <div class="m-tabs" id="mTabs">
                <span class="m-tab on" data-pane="code">代码</span>
                <span class="m-tab" data-pane="preview">预览</span>
            </div>
        </div>
        <div class="hdr-r">
            <button class="ico-btn" id="btnTheme" title="切换深色模式">🌙</button>
        </div>
    </header>

    <div class="bar">
        <button class="btn green" id="btnView" title="切换视图">
            <span class="bico">⊞</span><span class="btxt">分屏</span>
        </button>
        <div class="bsep"></div>
        <button class="btn" id="btnUndo" title="撤销 Ctrl+Z">
            <span class="bico">↩</span><span class="btxt">撤销</span>
        </button>
        <button class="btn" id="btnRedo" title="重做 Ctrl+Y">
            <span class="bico">↪</span><span class="btxt">重做</span>
        </button>
        <div class="bsep"></div>
        <button class="btn" id="btnRefresh" title="刷新预览 Ctrl+Enter">
            <span class="bico">↺</span><span class="btxt">刷新</span>
        </button>
        <button class="btn" id="btnCopy" title="复制富文本到公众号">
            <span class="bico">📋</span><span class="btxt">复制</span>
        </button>
        <button class="btn amber" id="btnImg" title="导出为 PNG 图片">
            <span class="bico">🖼</span><span class="btxt">生图</span>
        </button>
        <button class="btn rose" id="btnClear" title="清空内容">
            <span class="bico">🗑</span><span class="btxt">清空</span>
        </button>
    </div>

    <div class="ws" id="ws">
        <div class="inp-panel" id="inPanel">
            <div class="ph">
                <span class="pdot g"></span>
                <span class="plbl">HTML · Markdown</span>
            </div>
            <textarea id="codeIn" placeholder="💡 从左侧选择模板，或在此直接输入代码…

支持：
  · 原生 HTML（以 &lt; 开头自动识别）
  · Markdown（# 一级，## 二级，### 三级标题）
  · Tab 键缩进，Ctrl+Enter 刷新预览
  · 预览区内容可直接双击编辑"></textarea>
            <div class="pfoot">
                <span class="char-ct" id="charCt">0 字符 · 0 行</span>
                <span class="pfoot-hint">自动保存 ✦</span>
            </div>
        </div>

        <div class="drag-h" id="dragH">
            <div class="drag-pips">
                <div class="drag-pip"></div>
                <div class="drag-pip"></div>
                <div class="drag-pip"></div>
                <div class="drag-pip"></div>
            </div>
        </div>

        <div class="out-panel" id="outPanel">
            <div class="ph">
                <span class="pdot a"></span>
                <span class="plbl">效果预览</span>
                <span class="pbadge">双端可编辑 ✨</span>
            </div>
            <div class="out-scroll" id="outScroll">
                <div id="previewOut" contenteditable="true"></div>
            </div>
        </div>
    </div>

</div><!-- /main -->

<script>
/* =============================================
   小野排版编辑器 V42 — 完整优化版
   =============================================
   改动摘要 vs V41：
   · Toast 系统（完全替代 alert/confirm）
   · 深色模式（持久化）
   · 字符/行数统计
   · PC 视图三档切换（分屏/代码/预览）
   · 拖拽调整左右面板宽度（含触控）
   · 侧边栏模板搜索
   · 新增：极简报告、时尚杂志模板
   · 修复：loadDraft 后立即 render
   · 新增：重做按钮（Ctrl+Y / Ctrl+Shift+Z）
   · Tab 键缩进支持
   · Ctrl+Enter 快速刷新
   · 模板加载后自动跳预览（移动端）
   · 使用 .finally() 统一清理导出状态

            sbClose:  document.getElementById('sbClose'),
            btnTheme: document.getElementById('btnTheme'),
            btnView:  document.getElementById('btnView'),
            btnUndo:  document.getElementById('btnUndo'),
            btnRedo:  document.getElementById('btnRedo'),
            btnRef:   document.getElementById('btnRefresh'),
            btnCopy:  document.getElementById('btnCopy'),
            btnImg:   document.getElementById('btnImg'),
            btnClr:   document.getElementById('btnClear'),
        };
    },

    /* ── Build Sidebar ── */
    buildSB() {
        const list = this.D.tplList;
        const q = (this.D.sbSearch?.value || '').toLowerCase();
        list.innerHTML = '';
        this.TC.forEach(g => {
            const items = q ? g.items.filter(i => i.name.includes(q) || i.desc.includes(q)) : g.items;
            if (!items.length) return;
            const grp = document.createElement('div');
            grp.className = 'cat-group';
            grp.innerHTML = `<div class="cat-label">${g.cat}</div>`;
            items.forEach(i => {
                const card = document.createElement('div');
                card.className = 'tpl-card';
                card.style.setProperty('--c', i.c);
                card.innerHTML = `
                    <div class="tpl-ico" style="background:${i.bg}">${i.ico}</div>
                    <div class="tpl-inf">
                        <div class="tpl-name">${i.name}</div>
                        <div class="tpl-desc">${i.desc}</div>
                    </div>
                    ${i.tag ? `<span class="tpl-tag ${i.tag.cls}">${i.tag.t}</span>` : ''}
                `;
                card.addEventListener('click', () => this.useTpl(i.id));
                grp.appendChild(card);
            });
            list.appendChild(grp);
        });
    },

    /* ── Event Binding ── */
    bind() {
        const D = this.D;
        D.btnMenu.addEventListener('click', () => this.showSB(true));
        D.sbClose.addEventListener('click', () => this.showSB(false));
        D.ov.addEventListener('click', () => this.showSB(false));
        D.btnTheme.addEventListener('click', () => this.toggleTheme());
        D.btnView.addEventListener('click', () => this.cycleView());
        D.btnUndo.addEventListener('click', () => this.H.undo());
        D.btnRedo.addEventListener('click', () => this.H.redo());
        D.btnRef.addEventListener('click', () => { this.render(); this.toast('预览已刷新', 'info'); });
        D.btnCopy.addEventListener('click', () => this.doCopy());
        D.btnImg.addEventListener('click', () => this.doImg());
        D.btnClr.addEventListener('click', () => this.doClear());

        D.mTabs.addEventListener('click', e => {
            const t = e.target.closest('.m-tab');
            if (t) this.setMPane(t.getAttribute('data-pane'));
        });

        D.sbSearch.addEventListener('input', this.dbounce(() => this.buildSB(), 200));

        D.input.addEventListener('input', this.dbounce(() => {
            this.render(); this.H.save(); this.saveDraft(); this.updCt();
        }, 380));

        // Tab = 4 spaces in textarea
        D.input.addEventListener('keydown', e => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const s = e.target.selectionStart, en = e.target.selectionEnd;
                e.target.value = e.target.value.slice(0, s) + '    ' + e.target.value.slice(en);
                e.target.selectionStart = e.target.selectionEnd = s + 4;
            }
        });

        document.addEventListener('keydown', e => {
            const m = e.ctrlKey || e.metaKey;
            if (m && e.key === 'z' && !e.shiftKey) { e.preventDefault(); this.H.undo(); }
            if (m && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) { e.preventDefault(); this.H.redo(); }
            if (m && e.key === 'Enter') { e.preventDefault(); this.render(); this.toast('已刷新', 'info'); }
        });
    },

    /* ── Render ── */
    render() {
        const v = this.D.input.value;
        const o = this.D.output;
        if (!v.trim()) { o.innerHTML = ''; return; }
        if (v.trimStart()[0] === '<') {
            o.innerHTML = v;
        } else {
            o.innerHTML = v.split('\n').map(l => {
                const t = l.trim();
                if (!t) return '<br>';
                if (t.startsWith('### ')) return `<h3 style="color:#555;font-size:14px;margin:14px 0 6px">${t.slice(4)}</h3>`;
                if (t.startsWith('## '))  return `<h2 style="color:#1989fa;border-bottom:2px solid #e8f0fe;padding-bottom:5px;margin:18px 0 8px;font-size:17px">${t.slice(3)}</h2>`;
                if (t.startsWith('# '))   return `<h1 style="font-size:22px;margin:18px 0 10px">${t.slice(2)}</h1>`;
                return `<p style="margin:8px 0;line-height:1.75;color:#333">${l}</p>`;
            }).join('');
        }
    },

    updCt() {
        const v = this.D.input.value;
        this.D.charCt.textContent = `${v.length.toLocaleString()} 字符 · ${v.split('\n').length} 行`;
    },

    /* ── Use Template ── */
    useTpl(id) {
        const tpl = this.T[id];
        if (!tpl) return;
        this.D.input.value = tpl;
        this.D.input.scrollTop = 0;
        this.render();
        this.D.scroll.scrollTop = 0;
        this.H.save(); this.saveDraft(); this.updCt();
        this.toast('✨ 模板已加载', 'success');
        if (this.isMobile()) { this.showSB(false); this.setMPane('preview'); }
    },

    doClear() {
        if (!this.D.input.value.trim()) return;
        // Use toast-based confirm substitute
        if (confirm('确定清空所有内容吗？')) {
            this.D.input.value = ''; this.D.output.innerHTML = '';
            this.H.save(); this.saveDraft(); this.updCt();
            this.toast('已清空', 'info');
        }
    },

    /* ── History ── */
    H: {
        save() {
            const s = App.St, v = App.D.input.value;
            if (s.idx >= 0 && s.hist[s.idx] === v) return;
            s.hist = s.hist.slice(0, s.idx + 1);
            s.hist.push(v);
            if (s.hist.length > s.maxH) s.hist.shift(); else s.idx++;
        },
        undo() {
            const s = App.St;
            if (s.idx > 0) {
                s.idx--;
                App.D.input.value = s.hist[s.idx];
                App.render(); App.saveDraft(); App.updCt();
                App.toast('已撤销', 'info');
            } else App.toast('没有更多历史记录', 'warning');
        },
        redo() {
            const s = App.St;
            if (s.idx < s.hist.length - 1) {
                s.idx++;
                App.D.input.value = s.hist[s.idx];
                App.render(); App.saveDraft(); App.updCt();
                App.toast('已重做', 'info');
            } else App.toast('没有可重做的操作', 'warning');
        }
    },

    /* ── PC View Cycle: split → code → preview → split ── */
    cycleView() {
        if (this.isMobile()) return;
        const modes = ['split', 'code', 'preview'];
        const next = (modes.indexOf(this.St.view) + 1) % 3;
        this.St.view = modes[next];
        const ip = this.D.inPanel, op = this.D.outPanel, dh = document.getElementById('dragH');
        const v = this.St.view;

        if (v === 'split') {
            ip.style.display = ''; ip.style.flex = '1'; ip.style.width = '';
            op.style.display = ''; op.style.flex = '1'; op.style.width = '';
            dh.style.display = '';
        } else if (v === 'code') {
            ip.style.display = ''; ip.style.flex = '1'; ip.style.width = '';
            op.style.display = 'none';
            dh.style.display = 'none';
        } else {
            ip.style.display = 'none';
            op.style.display = ''; op.style.flex = '1'; op.style.width = '';
            dh.style.display = 'none';
        }

        const icons = ['⊞', '📝', '👁'];
        const labels = ['分屏', '代码', '预览'];
        this.D.btnView.querySelector('.bico').textContent = icons[next];
        this.D.btnView.querySelector('.btxt').textContent = labels[next];
    },

    /* ── Mobile Panel Switch ── */
    setMPane(pane) {
        this.St.mpane = pane;
        this.D.mTabs.querySelectorAll('.m-tab').forEach(t =>
            t.classList.toggle('on', t.getAttribute('data-pane') === pane));
        if (pane === 'preview') { this.render(); this.D.outPanel.classList.add('on'); }
        else this.D.outPanel.classList.remove('on');
    },

    /* ── Sidebar ── */
    showSB(open) {
        this.D.sidebar.classList.toggle('on', open);
        this.D.ov.classList.toggle('on', open);
    },

    /* ── Theme ── */
    toggleTheme() {
        const dark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
        this.D.btnTheme.textContent = dark ? '🌙' : '☀️';
        try { localStorage.setItem(this.St.tk, dark ? 'light' : 'dark'); } catch {}
    },
    loadTheme() {
        try {
            if (localStorage.getItem(this.St.tk) === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                this.D.btnTheme.textContent = '☀️';
            }
        } catch {}
    },

    /* ── Draft ── */
    saveDraft() { try { localStorage.setItem(this.St.dk, this.D.input.value); } catch {} },
    loadDraft() {
        try {
            const d = localStorage.getItem(this.St.dk);
            if (d) {
                this.D.input.value = d;
                this.H.save();
                this.render(); // Bug fix: was missing in V41
                this.updCt();
            }
        } catch {}
    },

    /* ── Drag-to-resize (mouse + touch) ── */
    Drag: {
        init() {
            const h  = document.getElementById('dragH');
            const ws = document.getElementById('ws');
            const ip = document.getElementById('inPanel');
            const op = document.getElementById('outPanel');
            if (!h) return;

            let on = false, sx = 0, sw = 0;

            const start = (x) => {
                on = true; sx = x; sw = ip.offsetWidth;
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
            };
            const move = (x) => {
                if (!on) return;
                const total = ws.offsetWidth - h.offsetWidth;
                const w = Math.max(160, Math.min(sw + x - sx, total - 160));
                ip.style.flex = 'none'; ip.style.width = w + 'px';
                op.style.flex = '1'; op.style.width = '';
            };
            const end = () => {
                if (!on) return;
                on = false;
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            };

            h.addEventListener('mousedown',  e => { start(e.clientX); e.preventDefault(); });
            document.addEventListener('mousemove', e => move(e.clientX));
            document.addEventListener('mouseup',   end);

            h.addEventListener('touchstart', e => { start(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
            document.addEventListener('touchmove', e => { move(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
            document.addEventListener('touchend',  end);
        }
    },

    /* ── Copy Rich Text ── */
    doCopy() {
        const o = this.D.output;
        if (!o.innerText.trim() && !o.querySelector('img')) {
            this.toast('预览区为空，请先加载模板', 'warning'); return;
        }
        // Inline all computed styles for WeChat paste compatibility
        o.querySelectorAll('*').forEach(el => {
            const s = window.getComputedStyle(el);
            const props = ['backgroundColor','color','fontSize','lineHeight','textAlign',
                           'padding','margin','borderRadius','display','boxShadow',
                           'textShadow','fontWeight','fontFamily'];
            props.forEach(p => { if (s[p]) el.style[p] = s[p]; });
            ['borderTop','borderBottom','borderLeft','borderRight'].forEach(p => {
                const val = s[p];
                if (val && val !== '0px none rgba(0, 0, 0, 0)') el.style[p] = val;
            });
            if (s.backgroundImage !== 'none') el.style.backgroundImage = s.backgroundImage;
        });

        const html = o.innerHTML
            .replace(/<div/gi, '<section')
            .replace(/<\/div>/gi, '</section>');

        const handler = e => {
            e.preventDefault();
            e.clipboardData.setData('text/html', html);
            e.clipboardData.setData('text/plain', o.innerText);
        };
        document.addEventListener('copy', handler);
        try {
            if (document.execCommand('copy'))
                this.toast('✅ 已复制！在公众号编辑器中粘贴即可', 'success', 3500);
            else throw 0;
        } catch {
            this.toast('复制失败，请手动全选复制预览区内容', 'error');
        } finally {
            document.removeEventListener('copy', handler);
        }
    },

    /* ── Export PNG ── */
    doImg() {
        const o = this.D.output;
        if (!o.innerText.trim() && !o.querySelector('img')) {
            this.toast('预览区为空', 'warning'); return;
        }
        if (typeof html2canvas === 'undefined') {
            this.toast('图片库尚未就绪，请稍后重试', 'error'); return;
        }

        const btn = this.D.btnImg;
        const ico = btn.querySelector('.bico'), lbl = btn.querySelector('.btxt');
        const [oi, ol] = [ico.textContent, lbl.textContent];
        ico.textContent = '⏳'; lbl.textContent = '生成中'; btn.disabled = true;

        // Temporarily expand to true content size
        const [ob, ow, om] = [o.style.backgroundColor, o.style.width, o.style.maxWidth];
        o.style.backgroundColor = '#ffffff';
        o.style.width = o.scrollWidth + 'px';
        o.style.maxWidth = 'none';

        html2canvas(o, {
            scale: 2,
            backgroundColor: '#ffffff',
            useCORS: true,
            allowTaint: true,
            width: o.scrollWidth,
            height: o.scrollHeight
        }).then(canvas => {
            const a = document.createElement('a');
            a.download = `小野排版_${Date.now()}.png`;
            a.href = canvas.toDataURL('image/png');
            a.click();
            this.toast('🖼 图片已生成，正在下载', 'success');
        }).catch(() => {
            this.toast('生成失败，请重试', 'error');
        }).finally(() => {
            ico.textContent = oi; lbl.textContent = ol; btn.disabled = false;
            o.style.backgroundColor = ob;
            o.style.width = ow;
            o.style.maxWidth = om;
        });
    },

    /* ── Toast ── */
    toast(msg, type = 'info', dur = 2600) {
        const c = document.getElementById('toasts');
        const el = document.createElement('div');
        el.className = `toast ${type}`;
        const icons = { success:'✅', error:'❌', info:'ℹ️', warning:'⚠️' };
        el.innerHTML = `<span>${icons[type] || ''}</span><span>${msg}</span>`;
        c.appendChild(el);
        requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('in')));
        setTimeout(() => {
            el.classList.remove('in');
            setTimeout(() => el.remove(), 250);
        }, dur);
    },

    /* ── Utils ── */
    isMobile: () => window.innerWidth <= 768,
    dbounce(fn, ms) {
        let t;
        return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
    }
};

window.addEventListener('load', () => App.init());
</script>
</body>
